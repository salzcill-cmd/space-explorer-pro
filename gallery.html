<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Space Explorer Pro</title>
    <meta name="description" content="Koleksi gambar luar angkasa yang memukau.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'space-dark': '#0a0e27',
                        'space-blue': '#1a1f3a',
                        'neon-purple': '#8b5cf6',
                        'neon-blue': '#3b82f6',
                        'neon-cyan': '#06b6d4',
                    },
                    fontFamily: {
                        'space': ['Orbitron', 'sans-serif'],
                        'body': ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3), 0 0 40px rgba(59, 130, 246, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .scroll-progress {
            position: fixed; top: 0; left: 0; width: 0%; height: 3px;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6, #06b6d4);
            z-index: 9999; transition: width 0.3s ease;
        }
        .page-transition { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .gallery-item {
            overflow: hidden;
            border-radius: 1rem;
            cursor: pointer;
        }
        .gallery-item img {
            transition: transform 0.5s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="text-white font-body min-h-screen">
    <div class="scroll-progress" id="scrollProgress"></div>
    
    <nav class="fixed top-0 left-0 w-full z-50 glass">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-r from-neon-purple to-neon-blue flex items-center justify-center">
                        <span class="font-space font-bold text-xl">S</span>
                    </div>
                    <span class="font-space font-bold text-xl gradient-text">Space Explorer</span>
                </a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="hover:text-neon-cyan transition-colors">Home</a>
                    <a href="apod.html" class="hover:text-neon-cyan transition-colors">APOD</a>
                    <a href="planets.html" class="hover:text-neon-cyan transition-colors">Planets</a>
                    <a href="dashboard.html" class="hover:text-neon-cyan transition-colors">Dashboard</a>
                    <a href="gallery.html" class="text-neon-cyan font-semibold">Gallery</a>
                    <a href="about.html" class="hover:text-neon-cyan transition-colors">About</a>
                    <button id="themeToggle" class="p-2 rounded-full glass hover:neon-glow" aria-label="Toggle theme">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                        </svg>
                    </button>
                </div>
                <button id="mobileMenuBtn" class="md:hidden p-2 rounded-full glass" aria-label="Open menu">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
            <div id="mobileMenu" class="md:hidden hidden mt-4 pb-4">
                <div class="flex flex-col space-y-4">
                    <a href="index.html" class="hover:text-neon-cyan">Home</a>
                    <a href="apod.html" class="hover:text-neon-cyan">APOD</a>
                    <a href="planets.html" class="hover:text-neon-cyan">Planets</a>
                    <a href="dashboard.html" class="hover:text-neon-cyan">Dashboard</a>
                    <a href="gallery.html" class="text-neon-cyan font-semibold">Gallery</a>
                    <a href="about.html" class="hover:text-neon-cyan">About</a>
                    <button id="themeToggleMobile" class="p-2 rounded-full glass w-fit">🌙</button>
                </div>
            </div>
        </div>
    </nav>
    
    <section class="pt-32 pb-12 px-4">
        <div class="container mx-auto text-center page-transition">
            <h1 class="font-space font-black text-5xl md:text-6xl mb-6 gradient-text" data-aos="fade-up">Gallery</h1>
            <p class="text-xl text-gray-300" data-aos="fade-up" data-aos-delay="200">Koleksi gambar luar angkasa yang memukau</p>
        </div>
    </section>
    
    <!-- Filter -->
    <section class="px-4 mb-8">
        <div class="container mx-auto">
            <div class="flex flex-wrap justify-center gap-3" data-aos="fade-up">
                <button class="filter-btn px-6 py-2 rounded-full glass hover:bg-white/10 transition-all active" data-filter="all">Semua</button>
                <button class="filter-btn px-6 py-2 rounded-full glass hover:bg-white/10 transition-all" data-filter="earth">Earth</button>
                <button class="filter-btn px-6 py-2 rounded-full glass hover:bg-white/10 transition-all" data-filter="planets">Planets</button>
                <button class="filter-btn px-6 py-2 rounded-full glass hover:bg-white/10 transition-all" data-filter="stars">Stars</button>
                <button class="filter-btn px-6 py-2 rounded-full glass hover:bg-white/10 transition-all" data-filter="galaxy">Galaxy</button>
                <button class="filter-btn px-6 py-2 rounded-full glass hover:bg-white/10 transition-all" data-filter="nebula">Nebula</button>
            </div>
        </div>
    </section>
    
    <!-- Gallery Grid -->
    <section class="px-4 pb-20">
        <div class="container mx-auto">
            <div id="galleryContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- Loading skeleton -->
                <div class="skeleton w-full h-64 rounded-xl"></div>
                <div class="skeleton w-full h-64 rounded-xl"></div>
                <div class="skeleton w-full h-64 rounded-xl"></div>
                <div class="skeleton w-full h-64 rounded-xl"></div>
            </div>
        </div>
    </section>
    
    <footer class="py-12 px-4 border-t border-white/10">
        <div class="container mx-auto text-center">
            <p class="text-gray-400">© 2026 Space Explorer Pro. Data disediakan oleh NASA API.</p>
        </div>
    </footer>
    
    <button id="backToTop" class="fixed bottom-8 right-8 p-4 rounded-full bg-gradient-to-r from-neon-purple to-neon-blue neon-glow opacity-0 invisible transition-all z-50">↑</button>
    <div id="toast" class="fixed bottom-8 left-8 glass rounded-xl px-6 py-4 transform translate-y-20 opacity-0 transition-all z-50">
        <span id="toastMessage"></span>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    <script type="module" src="js/gallery.js"></script>
</body>
</html>
