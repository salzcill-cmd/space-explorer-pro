<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planets - Space Explorer Pro</title>
    <meta name="description" content="Jelajahi planet-planet di tata surya dengan data lengkap dan visualisasi interaktif.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'space-dark': '#0a0e27',
                        'space-blue': '#1a1f3a',
                        'neon-purple': '#8b5cf6',
                        'neon-blue': '#3b82f6',
                        'neon-cyan': '#06b6d4',
                    },
                    fontFamily: {
                        'space': ['Orbitron', 'sans-serif'],
                        'body': ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <!-- AOS Animation -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .neon-glow {
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3),
                        0 0 40px rgba(59, 130, 246, 0.2);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6, #06b6d4);
            z-index: 9999;
            transition: width 0.3s ease;
        }
        
        .planet-card:hover .planet-image {
            transform: scale(1.05) rotate(5deg);
        }
        
        .page-transition {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-white font-body min-h-screen">
    <!-- Scroll Progress Bar -->
    <div class="scroll-progress" id="scrollProgress"></div>
    
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 w-full z-50 glass" id="navbar">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-r from-neon-purple to-neon-blue flex items-center justify-center">
                        <span class="font-space font-bold text-xl">S</span>
                    </div>
                    <span class="font-space font-bold text-xl gradient-text">Space Explorer</span>
                </a>
                
                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="hover:text-neon-cyan transition-colors duration-300">Home</a>
                    <a href="apod.html" class="hover:text-neon-cyan transition-colors duration-300">APOD</a>
                    <a href="planets.html" class="text-neon-cyan font-semibold">Planets</a>
                    <a href="dashboard.html" class="hover:text-neon-cyan transition-colors duration-300">Dashboard</a>
                    <a href="gallery.html" class="hover:text-neon-cyan transition-colors duration-300">Gallery</a>
                    <a href="about.html" class="hover:text-neon-cyan transition-colors duration-300">About</a>
                    <button id="themeToggle" class="p-2 rounded-full glass hover:neon-glow transition-all duration-300" aria-label="Toggle theme">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                        </svg>
                    </button>
                </div>
                
                <!-- Mobile Hamburger -->
                <button id="mobileMenuBtn" class="md:hidden p-2 rounded-full glass" aria-label="Open menu">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
            
            <!-- Mobile Menu -->
            <div id="mobileMenu" class="md:hidden hidden mt-4 pb-4">
                <div class="flex flex-col space-y-4">
                    <a href="index.html" class="hover:text-neon-cyan transition-colors duration-300">Home</a>
                    <a href="apod.html" class="hover:text-neon-cyan transition-colors duration-300">APOD</a>
                    <a href="planets.html" class="text-neon-cyan font-semibold">Planets</a>
                    <a href="dashboard.html" class="hover:text-neon-cyan transition-colors duration-300">Dashboard</a>
                    <a href="gallery.html" class="hover:text-neon-cyan transition-colors duration-300">Gallery</a>
                    <a href="about.html" class="hover:text-neon-cyan transition-colors duration-300">About</a>
                    <button id="themeToggleMobile" class="p-2 rounded-full glass hover:neon-glow transition-all duration-300 w-fit" aria-label="Toggle theme">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Page Header -->
    <section class="pt-32 pb-12 px-4">
        <div class="container mx-auto text-center page-transition">
            <h1 class="font-space font-black text-5xl md:text-6xl mb-6 gradient-text" data-aos="fade-up">
                Planets
            </h1>
            <p class="text-xl text-gray-300 max-w-3xl mx-auto" data-aos="fade-up" data-aos-delay="200">
                Jelajahi delapan planet di tata surya dengan data lengkap dan visual menakjubkan
            </p>
        </div>
    </section>
    
    <!-- Search/Filter -->
    <section class="px-4 mb-8">
        <div class="container mx-auto">
            <div class="flex flex-col md:flex-row gap-4 justify-center" data-aos="fade-up">
                <input type="text" id="searchInput" placeholder="Cari planet..." 
                       class="px-6 py-3 glass rounded-full focus:outline-none focus:ring-2 focus:ring-neon-purple transition-all duration-300 w-full md:w-96">
                <select id="filterType" class="px-6 py-3 glass rounded-full focus:outline-none focus:ring-2 focus:ring-neon-purple transition-all duration-300">
                    <option value="all">Semua Tipe</option>
                    <option value="Terrestrial">Terrestrial</option>
                    <option value="Gas Giant">Gas Giant</option>
                    <option value="Ice Giant">Ice Giant</option>
                </select>
            </div>
        </div>
    </section>
    
    <!-- Planets Grid -->
    <section class="px-4 pb-20">
        <div class="container mx-auto">
            <div id="planetsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Skeleton loaders -->
                <div class="glass rounded-2xl p-6 animate-pulse">
                    <div class="skeleton w-full h-48 rounded-xl mb-4"></div>
                    <div class="skeleton w-3/4 h-6 rounded mb-2"></div>
                    <div class="skeleton w-1/2 h-4 rounded"></div>
                </div>
                <div class="glass rounded-2xl p-6 animate-pulse">
                    <div class="skeleton w-full h-48 rounded-xl mb-4"></div>
                    <div class="skeleton w-3/4 h-6 rounded mb-2"></div>
                    <div class="skeleton w-1/2 h-4 rounded"></div>
                </div>
                <div class="glass rounded-2xl p-6 animate-pulse">
                    <div class="skeleton w-full h-48 rounded-xl mb-4"></div>
                    <div class="skeleton w-3/4 h-6 rounded mb-2"></div>
                    <div class="skeleton w-1/2 h-4 rounded"></div>
                </div>
                <div class="glass rounded-2xl p-6 animate-pulse">
                    <div class="skeleton w-full h-48 rounded-xl mb-4"></div>
                    <div class="skeleton w-3/4 h-6 rounded mb-2"></div>
                    <div class="skeleton w-1/2 h-4 rounded"></div>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Footer -->
    <footer class="py-12 px-4 border-t border-white/10">
        <div class="container mx-auto text-center">
            <div class="flex items-center justify-center space-x-3 mb-6">
                <div class="w-10 h-10 rounded-full bg-gradient-to-r from-neon-purple to-neon-blue flex items-center justify-center">
                    <span class="font-space font-bold text-xl">S</span>
                </div>
                <span class="font-space font-bold text-xl gradient-text">Space Explorer Pro</span>
            </div>
            <p class="text-gray-400">© 2026 Space Explorer Pro. Data disediakan oleh NASA API.</p>
        </div>
    </footer>
    
    <!-- Back to Top Button -->
    <button id="backToTop" class="fixed bottom-8 right-8 p-4 rounded-full bg-gradient-to-r from-neon-purple to-neon-blue neon-glow opacity-0 invisible transition-all duration-300 z-50" aria-label="Back to top">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
        </svg>
    </button>
    
    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-8 glass rounded-xl px-6 py-4 transform translate-y-20 opacity-0 transition-all duration-500 z-50">
        <p class="flex items-center space-x-2">
            <svg class="w-5 h-5 text-neon-cyan" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
            </svg>
            <span id="toastMessage">Notification message</span>
        </p>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script type="module" src="js/planets.js"></script>
</body>
</html>
